name: Test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install GNU cross compilation
      run: |
        sudo apt-get update
        sudo apt-get install gcc-multilib g++-multilib
    - name: Sync submodule to matching branch
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        echo "orbital-software repo branch: $BRANCH_NAME"

        git submodule update --init interfaces
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Test
    - name: Build
      run: |
        cd build
        cmake --build .
    - name: Run Tests
      run: |
        cd build
        ctest --verbose
