name: HIL Build
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: self-hosted

    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v3
    - name: Setup
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential cmake
    - name: Sync submodule to matching branch
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        echo "orbital-software repo branch: $BRANCH_NAME"

        git submodule update --init interfaces
        cd interfaces

        git fetch origin

        if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
        echo "Using matching interfaces branch: $BRANCH_NAME"
        git checkout "$BRANCH_NAME"
        git pull origin "$BRANCH_NAME"
        else
        echo "No matching branch found, falling back to main"
        git checkout main
        git pull origin main
        fi
    - name: Create binary directory
      run: |
        mkdir build_hil
    - name: Build
      run: |
        cd build_hil
        #Seems like we need to force the cxx standard here for it to be set in actions
        cmake .. -DCMAKE_BUILD_TYPE=HIL -DCMAKE_CXX_STANDARD=20
        make
