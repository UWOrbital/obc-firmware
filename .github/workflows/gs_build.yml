name: Ground Station Build
on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v3
    - name: Create binary directory
      run: |
        mkdir build
    - name: Sync submodule to matching branch
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        echo "orbital-software repo branch: $BRANCH_NAME"

        git submodule update --init interfaces
    - name: Build
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=GS -G"Unix Makefiles"
        make

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v3
    - name: Create binary directory
      run: |
        mkdir build
    - name: Sync submodule to matching branch
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        echo "orbital-software repo branch: $BRANCH_NAME"

        git submodule update --init interfaces
    - name: Build
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=GS -G"Unix Makefiles"
        make
